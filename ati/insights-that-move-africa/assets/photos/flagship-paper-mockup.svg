<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00093c"/>
      <stop offset="1" stop-color="#1a2780"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Back pages -->
  <rect x="40" y="30" width="300" height="450" rx="2" fill="#e8e6e0" filter="url(#dropShadow)"/>
  <rect x="44" y="34" width="296" height="442" rx="2" fill="#ffffff"/>

  <!-- Front cover -->
  <rect x="30" y="20" width="320" height="470" rx="3" fill="url(#cover)" filter="url(#dropShadow)"/>
  <rect x="30" y="20" width="4" height="470" fill="#fbb500"/>

  <!-- Cover content -->
  <text x="60" y="80" font-family="Poppins,sans-serif" font-size="11" fill="#fbb500" letter-spacing="3" font-weight="700">ATI</text>
  <text x="60" y="98" font-family="Poppins,sans-serif" font-size="9" fill="#ffffff" letter-spacing="2" font-weight="500" opacity="0.7">STRATEGIC ACTION PLAN</text>

  <text x="60" y="170" font-family="Poppins,sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">Investor</text>
  <text x="60" y="200" font-family="Poppins,sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">Perceptions</text>
  <text x="60" y="230" font-family="Poppins,sans-serif" font-size="24" fill="#ffffff" font-weight="700" letter-spacing="-0.5">of Risk</text>

  <line x1="60" y1="250" x2="120" y2="250" stroke="#fbb500" stroke-width="3"/>

  <text x="60" y="280" font-family="Poppins,sans-serif" font-size="13" fill="#ffffff" font-weight="300" opacity="0.92">in Africa's</text>
  <text x="60" y="298" font-family="Poppins,sans-serif" font-size="13" fill="#fbb500" font-weight="600" font-style="italic">Gender-Lens Funds</text>

  <!-- Decorative scribble -->
  <path d="M 60 318 Q 100 312 140 318 T 220 318" stroke="#fbb500" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Concentric rings mark -->
  <circle cx="290" cy="430" r="22" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="290" cy="430" r="15" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="290" cy="430" r="8" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="290" cy="430" r="2.5" fill="#fbb500"/>

  <text x="60" y="450" font-family="Poppins,sans-serif" font-size="9" fill="#ffffff" letter-spacing="2" opacity="0.5">MARCH 2026</text>
  <text x="60" y="465" font-family="Poppins,sans-serif" font-size="9" fill="#ffffff" letter-spacing="1.5" opacity="0.7" font-weight="500">Africa Communications Media Group</text>
</svg>
